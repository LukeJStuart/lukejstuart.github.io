{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ if .Pages }}
      <ul class="post-list">
        {{ range .Pages.ByDate.Reverse }}
          <li>
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </li>
        {{ end }}
      </ul>
    {{ else }}
      <p>nothing here yet.</p>
    {{ end }}
  </article>
{{ end }}
