{{ define "main" }}
  <article>
    <h1>{{ .Title }}</h1>
    {{ if not .Date.IsZero }}
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      <span class="reading-time">{{ .ReadingTime }} min read</span>
    {{ end }}
    {{ .Content }}
  </article>
{{ end }}
